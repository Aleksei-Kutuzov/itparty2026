services:
  db:
    image: postgres:15-alpine
    container_name: itparty2026api_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: itparty2026api_db
    volumes:
      - itparty2026api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - itparty2026api_network

  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    container_name: itparty2026api_api
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - itparty2026api_network

volumes:
  itparty2026api_postgres_data:

networks:
  itparty2026api_network:
    driver: bridge